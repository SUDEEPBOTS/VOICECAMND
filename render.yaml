services:
  - type: web
    name: voicesraver
    runtime: python
    region: oregon
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python main.py"
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: STRING_SESSION
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: VOSK_MODEL_PATH
        value: ./model
      - key: FASTAPI_PORT
        value: "10000"
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /
